<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كتالوج ألعاب PS4 المعدلة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #050a14;
            color: #ffffff;
            scroll-behavior: smooth;
        }

        .ps-gradient {
            background: linear-gradient(135deg, #003791 0%, #001d4c 100%);
        }

        .game-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: #0072ce;
            box-shadow: 0 15px 35px rgba(0, 114, 206, 0.25);
            background: rgba(255, 255, 255, 0.06);
        }

        .search-box {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .search-box:focus {
            border-color: #0072ce;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
        }

        .badge {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Header -->
    <header class="ps-gradient py-16 px-6 text-center shadow-2xl">
        <div class="container mx-auto">
            <h1 class="text-4xl md:text-6xl font-black mb-4">مكتبة ألعاب PS4</h1>
            <p class="text-blue-200 text-lg md:text-xl max-w-2xl mx-auto opacity-90">
                أضخم تشكيلة من الألعاب المترجمة والمدبلجة. ابحث عن لعبتك المفضلة الآن.
            </p>
        </div>
    </header>

    <!-- Search Area -->
    <div class="container mx-auto px-6 -mt-10">
        <div class="max-w-3xl mx-auto relative">
            <i class="fas fa-search absolute right-5 top-1/2 -translate-y-1/2 text-blue-400 text-xl"></i>
            <input type="text" id="gameSearch" onkeyup="filterGames()" 
                placeholder="ابحث عن Call of Duty, Resident Evil, God of War..." 
                class="search-box w-full py-5 pr-14 pl-8 rounded-2xl text-xl shadow-2xl">
        </div>
    </div>

    <!-- Stats Bar -->
    <div class="container mx-auto px-6 mt-12 mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-3">
            <div class="w-2 h-10 bg-blue-600 rounded-full"></div>
            <h2 class="text-2xl font-bold italic">القائمة المتوفرة</h2>
        </div>
        <div class="bg-blue-900/30 border border-blue-500/30 px-6 py-2 rounded-xl">
            <span class="text-gray-400 ml-2 text-sm">إجمالي الألعاب:</span>
            <span id="gameCounter" class="text-2xl font-black text-blue-400">0</span>
        </div>
    </div>

    <!-- Games Grid -->
    <main class="container mx-auto px-6 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6" id="gamesGrid">
        <!-- JS will populate this -->
    </main>

    <!-- Empty Result -->
    <div id="noResults" class="hidden text-center py-32">
        <i class="fas fa-gamepad text-8xl text-gray-800 mb-6"></i>
        <p class="text-2xl text-gray-500 font-bold">عذراً، اللعبة غير موجودة في القائمة حالياً</p>
    </div>

    <!-- Whatsapp Contact -->
    <a href="https://wa.me/YOUR_PHONE_NUMBER" target="_blank" 
        class="fixed bottom-8 right-8 bg-green-500 hover:bg-green-600 text-white px-8 py-4 rounded-full shadow-2xl transition-all hover:scale-105 flex items-center gap-3 z-50">
        <i class="fab fa-whatsapp text-2xl"></i>
        <span class="font-bold">أطلب ألعابك الآن</span>
    </a>

            { name: "A Plague Tale: Innocence", img: "https://placehold.co/400x550/001d4c/ffffff?text=Plague+Tale+1" },
            { name: "A Plague Tale: Requiem", img: "https://placehold.co/400x550/001d4c/ffffff?text=Plague+Tale+2" },
            { name: "Senua's Saga: Hellblade", img: "https://placehold.co/400x550/001d4c/ffffff?text=Senua" }
        ];

        function displayGames(list) {
            const grid = document.getElementById('gamesGrid');
            const counter = document.getElementById('gameCounter');
            const noResults = document.getElementById('noResults');
            
            grid.innerHTML = '';
            counter.innerText = list.length;

            if (list.length === 0) {
                noResults.classList.remove('hidden');
            } else {
                noResults.classList.add('hidden');
                list.forEach(game => {
                    const card = `
                        <div class="game-card rounded-2xl overflow-hidden p-3 group">
                            <div class="relative overflow-hidden rounded-xl mb-3">
                                <img src="${game.img}" alt="${game.name}" 
                                    class="w-full h-48 md:h-64 object-cover transition-transform group-hover:scale-110">
                                <div class="absolute top-2 left-2 flex flex-col gap-1">
                                    <span class="badge bg-green-500 text-white">عربي</span>
                                    <span class="badge bg-blue-600 text-white">4K</span>
                                </div>
                            </div>
                            <h3 class="text-sm md:text-base font-bold text-gray-100 line-clamp-2 min-h-[3rem] text-center">
                                ${game.name}
                            </h3>
                            <button class="w-full mt-3 bg-blue-600 hover:bg-blue-500 py-2 rounded-lg text-xs font-bold transition-colors">
                                طلب اللعبة
                            </button>
                        </div>
                    `;
                    grid.innerHTML += card;
                });
            }
        }

        function filterGames() {
            const term = document.getElementById('gameSearch').value.toLowerCase();
            const filtered = gamesList.filter(g => g.name.toLowerCase().includes(term));
            displayGames(filtered);
        }

        // Initialize display
        window.onload = () => displayGames(gamesList);
    </script>

</html>
