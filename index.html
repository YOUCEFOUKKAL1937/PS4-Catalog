<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IYAD&YOU Gaming | المتجر الرسمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        
        :root {
            --primary-green: #25d366;
            --dark-bg: #0b0e14;
            --card-bg: #1a1f29;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--dark-bg); 
            color: white; 
            margin: 0; 
            scroll-behavior: smooth;
        }
        
        /* تأثيرات الخلفية للهيدر */
        .ps-header { 
            background: linear-gradient(rgba(11, 14, 20, 0.7), rgba(11, 14, 20, 0.9)), 
                        url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2070'); 
            background-size: cover; 
            background-position: center; 
            border-bottom: 2px solid var(--primary-green); 
        }

        /* تحسين شكل البطاقات */
        .game-card { 
            background: var(--card-bg); 
            border-radius: 15px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 1px solid #2d3748; 
            position: relative; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            height: 100%;
        }

        .game-card:hover { 
            transform: translateY(-10px); 
            border-color: var(--primary-green); 
            box-shadow: 0 15px 30px rgba(37, 211, 102, 0.1); 
        }

        .game-card.selected { 
            border-color: var(--primary-green); 
            background: #064e3b; 
            box-shadow: inset 0 0 15px rgba(37, 211, 102, 0.2);
        }

        /* شكل اللعبة غير المتوفرة */
        .game-card.unavailable { opacity: 0.5; filter: grayscale(0.8); }
        .game-card.unavailable .status-badge { background: #ef4444; }

        .game-img-container { position: relative; overflow: hidden; }
        .game-img { 
            width: 100%; 
            aspect-ratio: 1/1.2; 
            object-fit: cover; 
            transition: transform 0.5s ease;
        }
        .game-card:hover .game-img { transform: scale(1.1); }

        .tag { 
            font-size: 0.7rem; 
            padding: 3px 8px; 
            border-radius: 6px; 
            font-weight: 700;
        }

        /* شريط التصفية */
        .filter-btn {
            padding: 8px 20px;
            border-radius: 20px;
            background: #1a1f29;
            border: 1px solid #2d3748;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .filter-btn.active {
            background: var(--primary-green);
            color: black;
            font-weight: bold;
        }

        .cart-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(17, 24, 39, 0.95); 
            backdrop-filter: blur(10px);
            border-top: 2px solid var(--primary-green); 
            padding: 1.2rem; transform: translateY(100%); 
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1); z-index: 100; 
        }
        .cart-bar.active { transform: translateY(0); }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0b0e14; }
        ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-green); }
    </style>
</head>
<body class="pb-32">

    <header class="ps-header py-16 text-center">
        <h1 class="text-6xl font-black italic tracking-tighter mb-2"> 
            IYAD&YOU <span class="text-green-500"> GAMING </span>
        </h1>
        <p class="text-gray-300 text-lg font-medium opacity-90">متجرك الأول لألعاب الـ PlayStation المعربة</p>
    </header>

    <!-- أدوات التحكم: البحث والتصنيف -->
    <div class="sticky top-0 z-50 bg-[#0b0e14]/90 backdrop-blur-lg border-b border-gray-800 p-4">
        <div class="max-w-5xl mx-auto space-y-4">
            <!-- البحث -->
            <div class="relative">
                <i class="fas fa-search absolute right-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="searchInput" onkeyup="render()" placeholder="ابحث عن اسم اللعبة..." 
                    class="w-full bg-gray-900 border border-gray-700 p-4 pr-12 rounded-2xl text-white focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none transition-all shadow-inner">
            </div>
            
            <!-- التصنيفات -->
            <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar justify-start sm:justify-center">
                <button onclick="filterBy('all')" class="filter-btn active" data-filter="all">الكل</button>
                <button onclick="filterBy('available')" class="filter-btn" data-filter="available">المتوفر حالياً</button>
                <button onclick="filterBy('dubbed')" class="filter-btn" data-filter="dubbed">مدبلج للعربية</button>
                <button onclick="filterBy('subtitled')" class="filter-btn" data-filter="subtitled">مترجم بالعربية</button>
            </div>
        </div>
    </div>

    <main class="container mx-auto px-4 mt-8">
        <div id="gameGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6">
            <!-- سيتم توليد الألعاب هنا -->
        </div>
        
        <!-- حالة البحث الفارغ -->
        <div id="noResults" class="hidden text-center py-20">
            <i class="fas fa-gamepad text-6xl text-gray-700 mb-4"></i>
            <p class="text-gray-400 text-xl">لم نجد أي ألعاب تطابق بحثك..</p>
        </div>
    </main>

    <!-- شريط الطلب السفلي -->
    <div id="cartBar" class="cart-bar flex flex-col sm:flex-row items-center justify-between gap-4 shadow-2xl">
        <div class="flex items-center gap-4 w-full sm:w-auto">
            <div id="count" class="bg-green-500 text-black font-black min-w-[50px] h-12 rounded-xl flex items-center justify-center text-2xl shadow-lg shadow-green-500/20">0</div>
            <div class="flex-1">
                <p class="font-bold text-sm text-green-500">تم اختيار</p>
                <p id="list" class="text-xs text-gray-300 truncate max-w-[200px] sm:max-w-md">لا يوجد ألعاب مختارة</p>
            </div>
            <button onclick="clearCart()" class="text-red-400 hover:text-red-300 text-sm font-bold ml-4">
                <i class="fas fa-trash-alt"></i> مسح
            </button>
        </div>
        
        <button onclick="sendWhatsApp()" class="w-full sm:w-auto bg-[#25d366] text-black px-10 py-4 rounded-2xl font-black hover:scale-105 active:scale-95 transition flex items-center justify-center gap-3 shadow-xl">
            <i class="fab fa-whatsapp text-2xl"></i> اطلب الآن عبر واتساب
        </button>
    </div>

        let cart = new Set();
        let currentFilter = 'all';

        function filterBy(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.dataset.filter === type) btn.classList.add('active');
            });
            render();
        }

        function render() {
            const grid = document.getElementById('gameGrid');
            const noResults = document.getElementById('noResults');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            grid.innerHTML = '';
            
            let filtered = games.filter(game => {
                const matchesSearch = game.name.toLowerCase().includes(searchTerm);
                const matchesFilter = 
                    currentFilter === 'all' || 
                    (currentFilter === 'available' && game.available) ||
                    (currentFilter === 'dubbed' && game.loc === 'dubbed') ||
                    (currentFilter === 'subtitled' && game.loc === 'subtitled');
                
                return matchesSearch && matchesFilter;
            });

            if (filtered.length === 0) {
                noResults.classList.remove('hidden');
            } else {
                noResults.classList.add('hidden');
            }

            filtered.forEach(game => {
                const isSelected = cart.has(game.name);
                const card = document.createElement('div');
                card.className = `game-card ${isSelected ? 'selected' : ''} ${!game.available ? 'unavailable' : ''}`;
                
                card.onclick = () => {
                    if (game.available) {
                        toggleGame(game.name);
                    } else {
                        showToast("عذراً، هذه اللعبة غير متوفرة حالياً");
                    }
                };

                let tagsHTML = `<div class="absolute top-2 right-2 flex flex-col gap-1 z-10">`;
                if (game.loc === 'dubbed') tagsHTML += `<span class="tag bg-blue-600 text-white shadow-lg">مدبلج </span>`;
                if (game.loc === 'subtitled') tagsHTML += `<span class="tag bg-purple-600 text-white shadow-lg">مترجم </span>`;
                tagsHTML += `</div>`;

                card.innerHTML = `
                    ${tagsHTML}
                    <div class="game-img-container">
                        <img src="${game.img}" class="game-img" loading="lazy" onerror="this.src='https://via.placeholder.com/300x400/1a1f29/white?text=IMAGE+ERROR'">
                    </div>
                    <div class="p-4 flex-grow flex flex-col justify-between">
                        <h3 class="text-sm font-bold leading-tight mb-2 line-clamp-2">${game.name}</h3>
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] font-bold px-2 py-1 rounded bg-black/30">
                                ${game.available ? '<span class="text-green-400">● متوفر</span>' : '<span class="text-red-400">● غير متوفر</span>'}
                            </span>
                            <i class="fas ${isSelected ? 'fa-check-circle text-green-400' : 'fa-plus-circle text-gray-600'} text-xl"></i>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            updateCartBar();
        }

        function toggleGame(name) {
            if (cart.has(name)) cart.delete(name);
            else cart.add(name);
            render();
        }

        function clearCart() {
            cart.clear();
            render();
        }

        function updateCartBar() {
            const bar = document.getElementById('cartBar');
            const countEl = document.getElementById('count');
            const listEl = document.getElementById('list');
            
            countEl.innerText = cart.size;
            listEl.innerText = cart.size > 0 ? Array.from(cart).join(' ، ') : "لا يوجد ألعاب مختارة";
            
            cart.size > 0 ? bar.classList.add('active') : bar.classList.remove('active');
        }

        function sendWhatsApp() {
            if (cart.size === 0) return;
            
            const gameList = Array.from(cart).map((g, i) => `${i+1}- ${g}`).join('\n');
            const message = `مرحباً IYAD&YOU Gaming 🎮\n\nأود طلب الألعاب التالية:\n------------------\n${gameList}\n------------------\nالعدد الإجمالي: ${cart.size}\nيرجى تأكيد الطلب.`;
            
            const encodedMessage = encodeURIComponent(message);
            window.open(`https://wa.me/213669066461?text=${encodedMessage}`);
        }

        function showToast(msg) {
            // يمكن استبدالها بمكتبة مثل Toastify لكن سنستخدم alert مبدئياً لتقليل الملفات الخارجية
            console.log(msg);
            const toast = document.createElement('div');
            toast.className = "fixed top-5 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-full z-[200] shadow-2xl animate-bounce";
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        window.onload = render;
    </script>
