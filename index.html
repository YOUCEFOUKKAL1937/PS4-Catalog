<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IYAD&YOU Gaming | القائمة الكاملة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #0b0e14; color: white; margin: 0; }
        
        .ps-header { 
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=2070'); 
            background-size: cover; background-position: center; 
            border-bottom: 3px solid #25d366; 
        }

        .game-card { 
            background: #1a1f29; 
            border-radius: 10px; 
            transition: all 0.25s ease; 
            border: 1px solid #2d3748; 
            position: relative; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            cursor: pointer; 
        }

        .game-card:hover { transform: scale(1.03); border-color: #25d366; z-index: 10; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .game-card.selected { border-color: #25d366; background: #064e3b; }
        /* ستايل خاص للعبة غير المتوفرة */
        .game-card.unavailable { opacity: 0.6; filter: grayscale(0.5); cursor: not-allowed; }
        .game-card.unavailable:hover { transform: none; border-color: #ef4444; }

        .game-img { width: 100%; aspect-ratio: 1/1.2; object-fit: cover; }

        .ar-tags { position: absolute; top: 8px; right: 8px; display: flex; flex-direction: column; gap: 3px; z-index: 20; }
        .tag { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; font-weight: 800; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
        .tag-dub { background: #0070d1; color: white; }
        .tag-sub { background: #8b5cf6; color: white; }

        .cart-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: #111827; border-top: 3px solid #25d366; 
            padding: 1rem; transform: translateY(100%); 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 100; 
        }
        .cart-bar.active { transform: translateY(0); }
    </style>
</head>
<body class="pb-32">

    <header class="ps-header py-10 text-center">
        <h1 class="text-5xl font-black italic tracking-tighter"> IYAD&YOU <span class="text-green-500"> GAMING </span></h1>
        <p class="text-gray-300 mt-2 text-sm font-bold">أضخم مكتبة ألعاب معربة (دبلجة وترجمة)</p>
    </header>

    <div class="sticky top-0 z-50 bg-[#0b0e14]/95 backdrop-blur-md p-4 shadow-2xl border-b border-gray-800">
        <div class="max-w-2xl mx-auto relative">
            <i class="fas fa-search absolute right-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="text" id="searchInput" onkeyup="render()" placeholder="ابحث عن لعبة (مثلاً: Resident Evil)..." 
                class="w-full bg-gray-800 border-2 border-gray-700 p-3 pr-12 rounded-2xl text-white focus:border-green-500 outline-none transition-all">
        </div>
    </div>

    <main class="container mx-auto px-4 mt-8">
        <div id="gameGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
    </main>

    <div id="cartBar" class="cart-bar flex items-center justify-between shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
        <div class="flex items-center gap-4">
            <div id="count" class="bg-green-500 text-black font-black min-w-[50px] h-12 rounded-xl flex items-center justify-center text-2xl">0</div>
            <div class="hidden sm:block">
                <p class="font-bold text-sm">الألعاب المختارة</p>
                <p id="list" class="text-xs text-gray-400 truncate max-w-xs">لا يوجد ألعاب</p>
            </div>
        </div>
        <button onclick="sendWhatsApp()" class="bg-[#25d366] text-black px-10 py-4 rounded-2xl font-black hover:scale-105 active:scale-95 transition flex items-center gap-3 shadow-lg">
            <i class="fab fa-whatsapp text-2xl"></i> اطلب الآن
        </button>
    </div>

             { name: "Resident Evil 2 Remake", loc: 'subtitled', available: true, img: "images/resident_evil_20.jpg" },
             { name: "Resident Evil 3 Remake", loc: 'subtitled', available: true, img: "images/resident_evil_30.jpg" },

             { name: "A Plague Tale: Requiem", loc: 'subtitled', available: false, img: "images/a_plague_tale_requiem0.jpg" },
             { name: "Metro Exodus", loc: 'subtitled', available: false, img: "images/metro_exodus0.jpg" },

             { name: "Call of Duty: Vanguard", loc: 'subtitled', available: false, img: "images/call_of_duty_vanguard0.jpg" },           
             { name: "Call of Duty: Advanced Warfare", loc: 'subtitled', available: false, img: "images/call_of_duty_advanced_warfare0.jpg" },
             { name: "Battlefield 1", loc: 'subtitled', available: false, img: "images/battlefield_10.jpg" },
             { name: "Battlefield 4", loc: 'subtitled', available: false, img: "images/battlefield_40.jpg" },
             { name: "Battlefield V", loc: 'subtitled', available: false, img: "images/battlefield_V0.jpg" },
             { name: "Ghost Recon: Breakpoint", loc: 'subtitled', available: false, img: "images/ghost_racon0.jpg" },

             { name: "Sekiro: Shadows Die Twice", loc: 'subtitled', available: false, img: "images/sekiro_shadows_die_twice0.jpg" },
             { name: "Bloodborne", loc: 'subtitled', available: false, img: "images/bloodborne0.jpg" },
             { name: "Nioh Complete Edition", loc: 'subtitled', available: false, img: "images/nioh_complete_edition0.jpg" },
             { name: "Sifu", loc: 'subtitled', available: true, img: "images/sifu0.jpg" },
             { name: "Onimusha Warlords", loc: 'subtitled', available: false, img: "images/onimusha_warlords0.jpg" },
             { name: "EA Sports FC 26", loc: 'subtitled', available: true, img: "images/ea_sports_fc260.jpg" },
             { name: "PES 26", loc: 'subtitled', available: false, img: "images/efootball_pes_20260.jpg" },
             { name: "WWE 2K24", loc: 'subtitled', available: true, img: "images/wwe_2k250.jpg" },
             { name: "Gran Turismo 7", loc: 'subtitled', available: false, img: "images/grand_turismo0.jpg" },
             { name: "Need For Speed Unbound", loc: 'subtitled', available: true, img: "images/need_for_speed0.jpg" },
             { name: "Street Fighter 6", loc: 'subtitled', available: false, img: "images/street_fighter_V0.jpg" },
             { name: "Detroit: Become Human", loc: 'subtitled', available: false, img: "images/detroit_become_human0.jpg" },
             { name: "The Dark Pictures: Man of Medan", loc: 'subtitled', available: false, img: "images/the_dark_pictures_man_of_medan0.jpg" },
             { name: "The Dark Pictures: Little Hope", loc: 'subtitled', available: false, img: "images/the_dark_pictures_little_hope0.jpg" },
             { name: "The Dark Pictures: House of Ashes", loc: 'subtitled', available: false, img: "images/the_dark_pictures_house_of_ashes0.jpg" },
             { name: "Death Stranding", loc: 'subtitled', available: false, img: "images/death_stranding0.jpg" },
             { name: "Senua's Saga: Hellblade II", loc: 'subtitled', available: false, img: "images/senuas_saga_hellblade_II0.jpg" },
             { name: "A Way Out", loc: 'subtitled', available: true, img: "images/a_way_out0.jpg" },
             { name: "Shadow of the Tomb Raider", loc: 'dubbed', available: true, img: "images/shadow_of_the_tomb_raider0.jpg" },
             { name: "Rise of the Tomb Raider", loc: 'dubbed', available: true, img: "images/rise_of_the_tomb_raider0.jpg" },
             { name: "Tomb Raider Definitive", loc: 'dubbed', available: true, img: "images/tomb_raider_definitive_edition0.jpg" },
             { name: "Sonic Frontiers", loc: 'subtitled', available: true, img: "images/sonic_frontiers0.jpg" },
             { name: "Dragon Ball Z: Kakarot", loc: 'subtitled', available: false, img: "images/dragon_ball_z_kakarot0.jpg" },
             { name: "hitman 3", loc: 'subtitled', available: false, img: "images/Hitman_30.jpg" },
        ];

        let cart = new Set();

        function render() {
            const grid = document.getElementById('gameGrid');
            const term = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = '';
            
            const filtered = games.filter(g => g.name.toLowerCase().includes(term));

            filtered.forEach(game => {
                const isSelected = cart.has(game.name);
                const isAvailable = game.available !== false; // القيمة الافتراضية متوفر

                const div = document.createElement('div');
                // إضافة كلاس 'unavailable' إذا كانت اللعبة غير متوفرة
                div.className = `game-card ${isSelected ? 'selected' : ''} ${!isAvailable ? 'unavailable' : ''}`;
                
                // تعديل الضغطة: إذا كانت غير متوفرة لا تفعل شيئاً
                div.onclick = () => {
                    if (isAvailable) {
                        toggleGame(game.name);
                    } else {
                        alert("عذراً، هذه اللعبة غير متوفرة حالياً في المخزن.");
                    }
                };

                // بناء شارات التعريب
                let tagsHTML = '<div class="ar-tags">';
                if (game.loc === 'both' || game.loc === 'dubbed') {
                    tagsHTML += `<span class="tag tag-dub">دبلجة</span>`;
                }
                if (game.loc === 'both' || game.loc === 'subtitled') {
                    tagsHTML += `<span class="tag tag-sub">ترجمة</span>`;
                }
                if (game.loc === 'none') {
                    tagsHTML += `<span class="tag bg-gray-600">English</span>`;
                }
                tagsHTML += '</div>';

                // منطق عرض حالة التوفر في الأسفل
                const availabilityStatus = isAvailable 
                    ? `<span class="text-[9px] text-green-400 font-bold"><i class="fas fa-check"></i> متوفر</span>`
                    : `<span class="text-[9px] text-red-500 font-bold"><i class="fas fa-times-circle"></i> غير متوفر</span>`;

                div.innerHTML = `
                    ${tagsHTML}
                    <img src="${game.img}" class="game-img" onerror="this.src='https://via.placeholder.com/300x400/1a1f29/white?text=GAME+IMAGE'">
                    <div class="p-3">
                        <h3 class="text-[10px] sm:text-[12px] font-black h-8 overflow-hidden leading-tight">${game.name}</h3>
                        <div class="flex justify-between items-center mt-2">
                            ${availabilityStatus}
                            <i class="fas ${isSelected ? 'fa-check-circle text-white' : 'fa-plus-circle text-gray-500'} ${!isAvailable ? 'hidden' : ''}"></i>
                        </div>
                    </div>
                `;
                grid.appendChild(div);
            });
            updateCart();
        }

        function toggleGame(name) {
            if (cart.has(name)) cart.delete(name);
            else cart.add(name);
            render();
        }

        function updateCart() {
            const bar = document.getElementById('cartBar');
            document.getElementById('count').innerText = cart.size;
            document.getElementById('list').innerText = Array.from(cart).join(' ، ') || "لا يوجد ألعاب";
            cart.size > 0 ? bar.classList.add('active') : bar.classList.remove('active');
        }

        function sendWhatsApp() {
            if (cart.size === 0) return;
            const text = `طلب ألعاب جديد 🎮:\n\nالألعاب المختارة:\n✅ ` + Array.from(cart).join('\n✅ ') + `\n\nإجمالي الألعاب: ${cart.size}\nالمصدر: متجر GamesZone`;
            window.open(`https://wa.me/213669066461?text=${encodeURIComponent(text)}`);
        }

        window.onload = render;
    </script>
</body>
</html>
