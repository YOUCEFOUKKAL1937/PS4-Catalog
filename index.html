    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #0b0e14; color: white; margin: 0; }
        
        .ps-header { 
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=2070'); 
            background-size: cover; background-position: center; 
            border-bottom: 3px solid #25d366; 
        }

        .game-card { 
            background: #1a1f29; 
            border-radius: 10px; 
            transition: all 0.25s ease; 
            border: 1px solid #2d3748; 
            position: relative; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            cursor: pointer; 
        }

        .game-card:hover { transform: scale(1.03); border-color: #25d366; z-index: 10; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .game-card.selected { border-color: #25d366; background: #064e3b; }
        /* ستايل خاص للعبة غير المتوفرة */
        .game-card.unavailable { opacity: 0.6; filter: grayscale(0.5); cursor: not-allowed; }
        .game-card.unavailable:hover { transform: none; border-color: #ef4444; }

        .game-img { width: 100%; aspect-ratio: 1/1.2; object-fit: cover; }

        .ar-tags { position: absolute; top: 8px; right: 8px; display: flex; flex-direction: column; gap: 3px; z-index: 20; }
        .tag { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; font-weight: 800; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
        .tag-dub { background: #0070d1; color: white; }
        .tag-sub { background: #8b5cf6; color: white; }

        .cart-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: #111827; border-top: 3px solid #25d366; 
            padding: 1rem; transform: translateY(100%); 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 100; 
        }
        .cart-bar.active { transform: translateY(0); }
    </style>
</head>
<body class="pb-32">

             { name: "hitman 3", loc: 'subtitled', available: true, img: "images/Hitman 3.jpg" },
        ];

        let cart = new Set();

        function render() {
            const grid = document.getElementById('gameGrid');
            const term = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = '';
            
            const filtered = games.filter(g => g.name.toLowerCase().includes(term));

            filtered.forEach(game => {
                const isSelected = cart.has(game.name);
                const isAvailable = game.available !== false; // القيمة الافتراضية متوفر

                const div = document.createElement('div');
                // إضافة كلاس 'unavailable' إذا كانت اللعبة غير متوفرة
                div.className = `game-card ${isSelected ? 'selected' : ''} ${!isAvailable ? 'unavailable' : ''}`;
                
                // تعديل الضغطة: إذا كانت غير متوفرة لا تفعل شيئاً
                div.onclick = () => {
                    if (isAvailable) {
                        toggleGame(game.name);
                    } else {
                        alert("عذراً، هذه اللعبة غير متوفرة حالياً في المخزن.");
                    }
                };

                // بناء شارات التعريب
                let tagsHTML = '<div class="ar-tags">';
                if (game.loc === 'both' || game.loc === 'dubbed') {
                    tagsHTML += `<span class="tag tag-dub">دبلجة</span>`;
                }
                if (game.loc === 'both' || game.loc === 'subtitled') {
                    tagsHTML += `<span class="tag tag-sub">ترجمة</span>`;
                }
                if (game.loc === 'none') {
                    tagsHTML += `<span class="tag bg-gray-600">English</span>`;
                }
                tagsHTML += '</div>';

                // منطق عرض حالة التوفر في الأسفل
                const availabilityStatus = isAvailable 
                    ? `<span class="text-[9px] text-green-400 font-bold"><i class="fas fa-check"></i> متوفر</span>`
                    : `<span class="text-[9px] text-red-500 font-bold"><i class="fas fa-times-circle"></i> غير متوفر</span>`;

                div.innerHTML = `
                    ${tagsHTML}
                    <img src="${game.img}" class="game-img" onerror="this.src='https://via.placeholder.com/300x400/1a1f29/white?text=GAME+IMAGE'">
                    <div class="p-3">
                        <h3 class="text-[10px] sm:text-[12px] font-black h-8 overflow-hidden leading-tight">${game.name}</h3>
                        <div class="flex justify-between items-center mt-2">
                            ${availabilityStatus}
                            <i class="fas ${isSelected ? 'fa-check-circle text-white' : 'fa-plus-circle text-gray-500'} ${!isAvailable ? 'hidden' : ''}"></i>
                        </div>
                    </div>
                `;
                grid.appendChild(div);
            });
            updateCart();
        }

        function toggleGame(name) {
            if (cart.has(name)) cart.delete(name);
            else cart.add(name);
            render();
        }

        function updateCart() {
            const bar = document.getElementById('cartBar');
            document.getElementById('count').innerText = cart.size;
            document.getElementById('list').innerText = Array.from(cart).join(' ، ') || "لا يوجد ألعاب";
            cart.size > 0 ? bar.classList.add('active') : bar.classList.remove('active');
        }

        function sendWhatsApp() {
            if (cart.size === 0) return;
            const text = `طلب ألعاب جديد 🎮:\n\nالألعاب المختارة:\n✅ ` + Array.from(cart).join('\n✅ ') + `\n\nإجمالي الألعاب: ${cart.size}\nالمصدر: متجر GamesZone`;
            window.open(`https://wa.me/213669066461?text=${encodeURIComponent(text)}`);
        }

        window.onload = render;
